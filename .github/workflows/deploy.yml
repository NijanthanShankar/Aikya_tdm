name: Hostinger Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy frontend (dist/) to Hostinger
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set ftp:passive-mode yes
          mirror --reverse --delete --verbose --parallel=4 ./dist/ "$FTP_SERVER_DIR"
          bye
          EOF

      - name: Deploy API (api/) to Hostinger
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set ssl:verify-certificate no
          set net:timeout 30
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set ftp:passive-mode yes
          mirror --reverse --delete --verbose --parallel=4 ./api/ "${FTP_SERVER_DIR}api/"
          bye
          EOF